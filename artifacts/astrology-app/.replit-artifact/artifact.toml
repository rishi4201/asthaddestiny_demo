kind = "web"
previewPath = "/"
title = "Astrology Platform"
version = "1.0.0"
id = "artifacts/astrology-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22714

[services.development]
run = "pnpm --filter @workspace/astrology-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astrology-app", "run", "build" ]
publicDir = "artifacts/astrology-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22714"
BASE_PATH = "/"
